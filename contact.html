<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Contact - Revin Prasya Danendra</title>

  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body class="contact-page">

  <header class="header d-flex align-items-center light-background sticky-top">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <h1 class="sitename">Revin Prasya Danendra</h1>
    </div>
  </header>

  <main class="main">

    <section class="contact section">
      <div class="container section-title text-center">
        <h2>Contact Me</h2>
        <p>Silakan kirim pesan jika ingin berdiskusi atau kolaborasi.</p>
      </div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">

            <!-- SUCCESS MESSAGE -->
            <div id="form-success" class="alert alert-success d-none text-center">
              ✅ Pesan berhasil dikirim. Terima kasih!
            </div>

            <!-- ERROR MESSAGE -->
            <div id="form-error" class="alert alert-danger d-none text-center">
              ❌ Terjadi kesalahan. Silakan coba lagi.
            </div>

            <form id="contact-form"
              action="https://formspree.io/f/xbdaeevv"
              method="POST"
              class="p-4 shadow rounded bg-white">

              <!-- Optional Subject -->
              <input type="hidden" name="_subject" value="Pesan Baru dari Website Revin">

              <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input type="text" name="name" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Your Email</label>
                <input type="email" name="email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" rows="6" class="form-control" required></textarea>
              </div>

              <div class="text-center">
                <button type="submit" class="btn btn-primary px-4">
                  Send Message
                </button>
              </div>

            </form>

          </div>
        </div>
      </div>

    </section>

  </main>

  <script>
    const form = document.getElementById("contact-form");
    const successMessage = document.getElementById("form-success");
    const errorMessage = document.getElementById("form-error");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.reset();
          successMessage.classList.remove("d-none");
          errorMessage.classList.add("d-none");
        } else {
          successMessage.classList.add("d-none");
          errorMessage.classList.remove("d-none");
        }
      } catch (error) {
        successMessage.classList.add("d-none");
        errorMessage.classList.remove("d-none");
      }
    });
  </script>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
