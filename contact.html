<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Contact - Revin Prasya Danendra</title>

  <!-- Bootstrap & Icons -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header id="header" class="header d-flex align-items-center light-background sticky-top">
    <div class="container-fluid position-relative d-flex align-items-center justify-content-between">

      <a href="index.html" class="logo d-flex align-items-center">
        <h1 class="sitename">Revin</h1>
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="resume.html">Resume</a></li>
          <li><a href="portfolio.html">Projects</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

      <div class="header-social-links">
        <a href="https://linkedin.com/" target="_blank">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://github.com/" target="_blank">
          <i class="bi bi-github"></i>
        </a>
      </div>

    </div>
  </header>
  <!-- ================= END HEADER ================= -->


  <!-- ================= CONTACT SECTION ================= -->
  <main class="main">

    <section class="contact section py-5">
      <div class="container">

        <div class="text-center mb-4">
          <h2>Contact Me</h2>
          <p>Silakan kirim pesan jika ingin berdiskusi, kolaborasi, atau peluang kerja.</p>
        </div>

        <div class="row justify-content-center">
          <div class="col-lg-8">

            <!-- Success -->
            <div id="form-success" class="alert alert-success d-none text-center">
              ✅ Pesan berhasil dikirim. Terima kasih!
            </div>

            <!-- Error -->
            <div id="form-error" class="alert alert-danger d-none text-center">
              ❌ Terjadi kesalahan. Silakan coba lagi.
            </div>

            <form id="contact-form"
              action="https://formspree.io/f/xbdaeevv"
              method="POST"
              class="p-4 shadow rounded bg-white">

              <!-- Subject -->
              <input type="hidden" name="_subject" value="Pesan Baru dari Website Revin">

              <!-- Anti Spam -->
              <input type="text" name="_gotcha" style="display:none">

              <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input type="text" name="name" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Your Email</label>
                <input type="email" name="email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" rows="6" class="form-control" required></textarea>
              </div>

              <div class="text-center">
                <button type="submit" class="btn btn-primary px-4">
                  Send Message
                </button>
              </div>

            </form>

          </div>
        </div>

      </div>
    </section>

  </main>
  <!-- ================= END CONTACT SECTION ================= -->


  <!-- ================= FOOTER ================= -->
  <footer class="footer text-center py-4">
    <div class="container">
      <p>© 2026 Revin Prasya Danendra. All Rights Reserved.</p>
    </div>
  </footer>
  <!-- ================= END FOOTER ================= -->


  <!-- ================= SCRIPT ================= -->
  <script>
    const form = document.getElementById("contact-form");
    const successMessage = document.getElementById("form-success");
    const errorMessage = document.getElementById("form-error");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.reset();
          successMessage.classList.remove("d-none");
          errorMessage.classList.add("d-none");
        } else {
          successMessage.classList.add("d-none");
          errorMessage.classList.remove("d-none");
        }
      } catch (error) {
        successMessage.classList.add("d-none");
        errorMessage.classList.remove("d-none");
      }
    });
  </script>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
